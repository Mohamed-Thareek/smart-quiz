<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Are You Smart?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🧠 Are You Smart?</h1>

<main class="quiz-box" aria-live="polite">
    <p id="question">Question here</p>

    <div id="options" class="options">
        <!-- option buttons injected by script -->
    </div>

    <div class="controls">
        <button id="nextBtn" class="secondary">Next</button>
    </div>

    <p id="result" aria-atomic="true"></p>
</main>

<script src="script.js"></script>
</body>
</html>
